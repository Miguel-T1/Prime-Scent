<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Carrinho | Prime Scent</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <a href="./index.html" class="logo">Prime Scent</a>

      <ul class="nav-links">
        <li class="search-menu-item">
          <button id="header-search-toggle" class="search-icon-button" aria-label="Abrir busca">

      <button type="submit">
        <span>Buscar</span>
