<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title description">
  <title id="title">Imagem padrão de perfume</title>
  <desc id="description">Ilustração minimalista de um frasco de perfume Prime Scent</desc>

  <rect width="800" height="800" fill="#ffffff"/>
  <rect x="120" y="120" width="560" height="560" rx="28" fill="#f8f5ef" stroke="#c9a96b" stroke-width="6"/>

  <rect x="338" y="150" width="124" height="68" rx="14" fill="#1f1f1f"/>
  <rect x="368" y="108" width="64" height="48" rx="10" fill="#c9a96b"/>

  <rect x="245" y="210" width="310" height="370" rx="72" fill="#ffffff" stroke="#1f1f1f" stroke-width="14"/>
  <rect x="282" y="258" width="236" height="270" rx="42" fill="#ead8b5"/>

  <line x1="320" y1="320" x2="480" y2="320" stroke="#1f1f1f" stroke-width="7"/>
  <text x="400" y="392" text-anchor="middle" font-family="Georgia, serif" font-size="44" letter-spacing="5" fill="#1f1f1f">PRIME</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" letter-spacing="9" fill="#1f1f1f">SCENT</text>
  <line x1="320" y1="472" x2="480" y2="472" stroke="#1f1f1f" stroke-width="7"/>

  <text x="400" y="635" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#5f584f">Imagem indisponível</text>
</svg>
